<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Rilis & Produksi — Capta</title>
<link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div id="overlay" class="overlay"></div>
<div class="app">
  <nav class="sidebar"></nav>
  <div class="main">
    <header class="topbar">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <div><div class="topbar-title">Rilis & Produksi</div></div>
      <div class="topbar-r">
        <button class="btn btn-primary btn-sm hide-mobile" onclick="openModal('modal-rilis')">+ Rilis Baru</button>
        <div class="chip"></div>
      </div>
    </header>
    <div class="page">
      <button class="btn btn-primary" style="margin-bottom:16px;width:100%;display:none" id="btn-add-mobile" onclick="openModal('modal-rilis')">+ Tambah Rilis Baru</button>
      <div id="rilis-list"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-rilis">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-rilis-title">Rilis Baru</h2>
      <button class="modal-close" onclick="closeModal('modal-rilis')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid form-2">
        <div class="field form-span2"><label>Nama Koleksi</label><input id="r-nama" placeholder="Koleksi 01 — Foundational"></div>
        <div class="field"><label>Tanggal Rilis (target)</label><input id="r-tgl-rilis" type="date"></div>
        <div class="field"><label>Status</label>
          <select id="r-status">
            <option value="perencanaan">Perencanaan</option>
            <option value="produksi">Dalam Produksi</option>
            <option value="selesai">Selesai</option>
            <option value="tunda">Ditunda</option>
          </select>
        </div>
        <div class="field"><label>Nama Konveksi</label><input id="r-konveksi" placeholder="CV Maju Jaya"></div>
        <div class="field"><label>Biaya Konveksi (Rp)</label><input id="r-biaya" type="number" placeholder="5000000"></div>
        <div class="field"><label>Mulai Produksi</label><input id="r-mulai" type="date"></div>
        <div class="field"><label>Estimasi Selesai</label><input id="r-selesai" type="date"></div>
        <div class="field form-span2"><label>Catatan</label><textarea id="r-catatan" rows="2" placeholder="Catatan tambahan..."></textarea></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('modal-rilis')">Batal</button>
      <button class="btn btn-primary" onclick="saveRilis()">Simpan</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-produk">
  <div class="modal">
    <div class="modal-head">
      <h2>Tambah Produk ke Rilis</h2>
      <button class="modal-close" onclick="closeModal('modal-produk')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid form-2">
        <div class="field"><label>Kode Produk</label><input id="p-kode" placeholder="CPT-005"></div>
        <div class="field"><label>Kategori</label>
          <select id="p-kategori">
            <option>T-Shirt</option><option>Sweater</option><option>Hoodie</option>
            <option>Celana</option><option>Kemeja</option><option>Aksesoris</option><option>Lainnya</option>
          </select>
        </div>
        <div class="field form-span2"><label>Nama Produk</label><input id="p-nama" placeholder="Nama lengkap produk"></div>
        <div class="field"><label>Harga Modal / pcs (Rp)</label><input id="p-modal" type="number"></div>
        <div class="field"><label>Harga Shopee (Rp)</label><input id="p-shopee" type="number"></div>
        <div class="field"><label>Harga Tokopedia (Rp)</label><input id="p-tokopedia" type="number"></div>
        <div class="field"><label>Harga TikTok Shop (Rp)</label><input id="p-tiktok" type="number"></div>
        <div class="field form-span2">
          <label>Ukuran & Stok Awal</label>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px" id="ukuran-grid"></div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('modal-produk')">Batal</button>
      <button class="btn btn-primary" onclick="saveProduk()">Simpan</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
let editRilisId = null;
let activeProdukRilisId = null;
const UKURAN_DEFAULT = ['S','M','L','XL'];

function buildUkuranGrid(kategori) {
  const ukurans = (kategori === 'Aksesoris') ? ['Free Size'] : UKURAN_DEFAULT;
  document.getElementById('ukuran-grid').innerHTML = ukurans.map(u => `
    <div style="text-align:center">
      <div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px">${u}</div>
      <input type="number" id="stok-${u}" placeholder="0" style="width:100%;padding:7px;border:1px solid var(--border);border-radius:6px;text-align:center;font-size:13px;outline:none">
    </div>
  `).join('');
}

function renderRilis() {
  const rilisAll = DB.get('rilis');
  const produkAll = DB.get('produk');
  const stokAll = DB.get('stok');
  const el = document.getElementById('rilis-list');

  if (!rilisAll.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">◇</div><div class="empty-title">Belum ada rilis</div><div class="empty-sub">Klik "+ Rilis Baru" untuk mulai</div></div>`;
    return;
  }

  el.innerHTML = rilisAll.map(r => {
    const produkRilis = produkAll.filter(p => p.rilis_id === r.id);
    const totalStok = stokAll.filter(s => produkRilis.find(p => p.kode === s.kode)).reduce((a,s) => a + (s.stok_awal||0), 0);
    const sisa = r.estimasi_selesai ? Math.max(0, Math.round((new Date(r.estimasi_selesai)-new Date())/86400000)) : null;

    return `
    <div class="panel">
      <div class="panel-head">
        <div style="min-width:0">
          <div class="panel-title" style="margin-bottom:4px">${r.nama}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${badgeProduksi(r.status)}
            <span class="badge badge-gray">Rilis: ${fmtDate(r.tanggal_rilis)}</span>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-outline btn-sm" onclick="editRilis('${r.id}')">Edit</button>
          <button class="btn btn-teal btn-sm" onclick="openAddProduk('${r.id}')">+ Produk</button>
        </div>
      </div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
          <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:18px;font-weight:600;color:var(--text)">${produkRilis.length}</div>
            <div style="font-size:10px;color:var(--text3)">Jenis produk</div>
          </div>
          <div style="background:var(--surface);border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:18px;font-weight:600;color:var(--text)">${totalStok}</div>
            <div style="font-size:10px;color:var(--text3)">Total pcs</div>
          </div>
          <div style="background:${sisa!==null&&sisa<=7?'var(--amber-l)':'var(--blue-l)'};border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:18px;font-weight:600;color:${sisa!==null&&sisa<=7?'var(--amber-t)':'var(--blue-t)'}">${sisa !== null ? sisa : '—'}</div>
            <div style="font-size:10px;color:${sisa!==null&&sisa<=7?'var(--amber-t)':'var(--blue-t)'}">Hari tersisa</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;color:var(--text2)">
          <div><span style="color:var(--text3)">Konveksi:</span> ${r.konveksi||'—'}</div>
          <div><span style="color:var(--text3)">Biaya:</span> <strong>${rpFull(r.biaya_konveksi)}</strong></div>
          <div><span style="color:var(--text3)">Mulai:</span> ${fmtDate(r.tanggal_produksi)}</div>
          <div><span style="color:var(--text3)">Selesai:</span> ${fmtDate(r.estimasi_selesai)}</div>
        </div>
        ${produkRilis.length ? `
        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Produk</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${produkRilis.map(p => `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface);border-radius:6px;gap:8px">
                <div style="min-width:0">
                  <div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nama}</div>
                  <div style="font-size:10px;color:var(--text3)">${p.kode} &middot; ${p.kategori}</div>
                </div>
                <div style="text-align:right;flex-shrink:0">
                  <div style="font-size:11px;color:var(--teal-t);font-weight:500">${rpFull(p.modal_pcs)}</div>
                  <div style="font-size:10px;color:var(--text3)">modal/pcs</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>` : ''}
        ${r.catatan ? `<div style="margin-top:10px;font-size:11px;color:var(--text3);font-style:italic">${r.catatan}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function openAddProduk(rilisId) {
  activeProdukRilisId = rilisId;
  ['p-kode','p-nama','p-modal','p-shopee','p-tokopedia','p-tiktok'].forEach(id => document.getElementById(id).value = '');
  buildUkuranGrid('T-Shirt');
  openModal('modal-produk');
}
document.addEventListener('change', e => { if (e.target.id === 'p-kategori') buildUkuranGrid(e.target.value); });

function saveRilis() {
  const item = {
    nama: document.getElementById('r-nama').value.trim(),
    tanggal_rilis: document.getElementById('r-tgl-rilis').value,
    status: document.getElementById('r-status').value,
    konveksi: document.getElementById('r-konveksi').value.trim(),
    biaya_konveksi: +document.getElementById('r-biaya').value || 0,
    tanggal_produksi: document.getElementById('r-mulai').value,
    estimasi_selesai: document.getElementById('r-selesai').value,
    catatan: document.getElementById('r-catatan').value.trim(),
  };
  if (!item.nama) { toast('Nama koleksi wajib diisi', 'error'); return; }
  if (editRilisId) { DB.update('rilis', editRilisId, item); toast('Rilis diperbarui'); editRilisId = null; }
  else { DB.push('rilis', item); toast('Rilis ditambahkan'); }
  closeModal('modal-rilis');
  renderRilis();
}

function saveProduk() {
  const kode = document.getElementById('p-kode').value.trim().toUpperCase();
  const nama = document.getElementById('p-nama').value.trim();
  const kategori = document.getElementById('p-kategori').value;
  if (!kode || !nama) { toast('Kode dan nama wajib diisi', 'error'); return; }
  if (DB.get('produk').find(p => p.kode === kode)) { toast('Kode sudah dipakai', 'error'); return; }

  const produk = {
    rilis_id: activeProdukRilisId,
    kode, nama, kategori,
    modal_pcs: +document.getElementById('p-modal').value || 0,
    harga_shopee: +document.getElementById('p-shopee').value || 0,
    harga_tokopedia: +document.getElementById('p-tokopedia').value || 0,
    harga_tiktok: +document.getElementById('p-tiktok').value || 0,
  };
  DB.push('produk', produk);

  const ukurans = kategori === 'Aksesoris' ? ['Free Size'] : UKURAN_DEFAULT;
  ukurans.forEach(u => {
    const stokEl = document.getElementById('stok-' + u);
    const val = +(stokEl?.value || 0);
    DB.push('stok', { produk_id: produk.id, kode, ukuran: u, stok_awal: val, batas_min: 5 });
  });

  toast('Produk ditambahkan');
  closeModal('modal-produk');
  renderRilis();
}

function editRilis(id) {
  const r = DB.get('rilis').find(x => x.id === id);
  if (!r) return;
  editRilisId = id;
  document.getElementById('modal-rilis-title').textContent = 'Edit Rilis';
  document.getElementById('r-nama').value = r.nama || '';
  document.getElementById('r-tgl-rilis').value = r.tanggal_rilis || '';
  document.getElementById('r-status').value = r.status || 'perencanaan';
  document.getElementById('r-konveksi').value = r.konveksi || '';
  document.getElementById('r-biaya').value = r.biaya_konveksi || '';
  document.getElementById('r-mulai').value = r.tanggal_produksi || '';
  document.getElementById('r-selesai').value = r.estimasi_selesai || '';
  document.getElementById('r-catatan').value = r.catatan || '';
  openModal('modal-rilis');
}

if (window.innerWidth < 768) document.getElementById('btn-add-mobile').style.display = 'flex';
if (initPage('rilis', 'Rilis & Produksi', 'Kelola koleksi & konveksi')) renderRilis();
</script>
</body>
</html>
